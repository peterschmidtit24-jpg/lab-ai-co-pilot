<!--


 aria-live="polite" → screen reader announces text changes without
     interrupting whatever the user is currently hearing              
<p
  id="status"
  role="status"
  aria-live="polite"
  aria-atomic="true"
>
  Waiting for update…
</p>

 aria-controls ties the button to the region it affects         
<button
  id="update-btn"
  type="button"
  aria-controls="status"
  aria-pressed="false"
>
  Update status
</button>

-->
