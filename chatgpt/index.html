<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DOM Manipulation Example</title>
  <script src="script.js" defer></script>
</head>
<body>

  <p id="status" role="status" aria-live="polite">
    Waiting for action...
  </p>

  <button id="changeStatusButton" type="button">
    Change status
  </button>

</body>
</html>
